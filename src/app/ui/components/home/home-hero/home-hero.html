<div class="hero-container">
  <mat-chip-set class="hero-chip">
    <mat-chip class="custom-chip">
      <mat-icon matChipAvatar>auto_awesome</mat-icon>
      Perspectives, unfiltered
    </mat-chip>
  </mat-chip-set>

  <h1 class="hero-title">
    <span class="gradient-text">Discover </span>
    <span class="gradient-hero">True</span><br />
    <span class="gradient-text">Perspectives</span>
  </h1>

  <p class="hero-subtitle">
    Join a community dedicated to sharing transparent, profound, and unbiased viewpoints from around the globe.
  </p>

  <div class="cta-container">
    <button mat-flat-button color="primary" class="cta-primary" routerLink="/account">
      <mat-icon>add</mat-icon>
      Share Your PoV
    </button>
    <button mat-stroked-button class="cta-secondary">
      Learn More
    </button>
  </div>
</div>
