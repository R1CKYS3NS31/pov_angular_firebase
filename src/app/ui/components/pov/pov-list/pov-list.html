@if (loading()) {
  <div class="skeleton-container">
    @for (item of skeletonArray; track item) {
      <div class="skeleton-card">
        <div class="skeleton-header">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-meta">
            <div class="skeleton-name"></div>
            <div class="skeleton-date"></div>
          </div>
        </div>
        <div class="skeleton-content">
          <div class="skeleton-title"></div>
          <div class="skeleton-body"></div>
          <div class="skeleton-points">
            <div class="skeleton-point"></div>
            <div class="skeleton-point"></div>
          </div>
        </div>
      </div>
    }
  </div>
}

<div class="list-container">
  @if (!loading() && povs() && !povs()!.empty) {
    <div class="pov-items">
      @for (pov of povs()!.content; track pov.id) {
        <app-pov-card [pov]="pov" (edit)="edit.emit($event)" (delete)="delete.emit($event)">
        </app-pov-card>
      }
    </div>
  }
  <div #loadMoreTrigger class="load-more-trigger" [class.hidden]="!hasMore()">
    @if (loadingMore()) {
      <mat-spinner diameter="32"></mat-spinner>
    }
  </div>
</div>
