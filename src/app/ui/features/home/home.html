<div class="home-container">
  <section class="hero">
    <h1>PoV Theme Engine</h1>
    <p>Experience the custom <strong>#FBA914</strong> palette in action with Material 3.</p>
  </section>

  <div class="demo-grid">
    <!-- Primary Palette -->
    <mat-card class="demo-card primary-border">
      <mat-card-header>
        <mat-card-title>Primary Palette</mat-card-title>
        <mat-card-subtitle>Main Brand Color</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>The primary palette is used for the most important UI elements.</p>
        <div class="button-row">
          <button mat-flat-button color="primary">Action</button>
          <button mat-stroked-button color="primary">Outline</button>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Tertiary Palette -->
    <mat-card class="demo-card tertiary-border">
      <mat-card-header>
        <mat-card-title>Tertiary Palette</mat-card-title>
        <mat-card-subtitle>Accent Branding</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>The tertiary palette provides a distinct accent for secondary actions.</p>
        <div class="button-row">
          <button mat-flat-button color="tertiary">Accent</button>
          <button mat-stroked-button color="tertiary">Outline</button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <button 
    mat-fab 
    color="primary" 
    class="theme-toggle-fab" 
    (click)="themeService.toggleTheme()"
    aria-label="Toggle dark/light mode"
  >
    <mat-icon>{{ themeService.themeMode() === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
  </button>
</div>
